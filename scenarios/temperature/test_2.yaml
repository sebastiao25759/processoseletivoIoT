name: 'Caso de Teste 2: Alarme por Elevação Térmica (Variação Y)'
version: 1
author: 'Professor/Validador'
steps:
  # 1. Aguarda inicialização
  - wait-serial: 'Sistema de Monitoramento Inicializado'

  # 2. Define uma temperatura inicial estável no MPU6050 (Ex: 20°C) com a porta FECHADA
  - set-control:
      part-id: imu1
      control: temperature
      value: 20
  - set-control:
      part-id: btn1
      control: pressed
      value: 1
  - delay: 1s

  # 3. Simula uma subida brusca de temperatura acima do limite Y (Ex: se Y = 3°C, sobe para 24°C)
  - set-control:
      part-id: imu1
      control: temperature
      value: 24

  # 4. O sistema deve detectar o gradiente/variação térmica e disparar o alarme imediatamente por segurança
  - wait-serial: 'ALERTA: Degradacao termica detectada!'
  
  - delay: 500ms
