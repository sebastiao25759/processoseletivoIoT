name: 'Caso de Teste 3: Retorno ao Estado Normal (Cessação do Alarme)'
version: 1
author: 'Professor/Validador'
steps:
  # 1. Aguarda inicialização e força estado de alarme deixando a porta aberta
  - wait-serial: 'Sistema de Monitoramento Inicializado'
  - set-control:
      part-id: btn1
      control: pressed
      value: 0
  
  # 2. Aguarda o tempo necessário para disparar o alarme por tempo
  - wait-serial: 'ALERTA: Porta aberta por muito tempo!'

  # 3. Aluno simula o fechamento da porta (pressionando o botão novamente)
  - set-control:
      part-id: btn1
      control: pressed
      value: 1
  - delay: 500ms

  # 4. O sistema deve registrar que a situação foi normalizada
  - wait-serial: 'Status: Sistema Normalizado.'
  
  - delay: 500ms
