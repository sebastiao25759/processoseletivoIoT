name: 'Cenário 3 - Reset Manual de Turno'
version: 1
author: 'Aluno'
steps:
  # 1. Aguarda a inicialização
  - wait-serial: 'Contador de Producao Inicializado'

  # 2. Simula o ato de pressionar o botão de reset (muda o estado para pressionado)
  - set-control:
      part-id: btn1
      control: pressed
      value: 1
  - delay: 200ms

  # 3. Simula a liberação do botão (muda o estado de volta para solto)
  - set-control:
      part-id: btn1
      control: pressed
      value: 0

  # 4. O sistema deve interceptar a interrupção/leitura do botão e limpar os dados atuais
  # Substitua pela mensagem correspondente que o seu código imprime ao resetar
  - wait-serial: 'Turno resetado com sucesso. Contadores zerados.'
  
  - delay: 500ms
