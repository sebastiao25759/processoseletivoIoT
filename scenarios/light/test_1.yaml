name: 'Cenário 1 - Contagem Normal de Peças'
version: 1
author: 'Aluno'
steps:
  # 1. Aguarda o sistema inicializar completamente
  - wait-serial: 'Contador de Producao Inicializado'

  # 2. Configura o sensor com alta luminosidade (Esteira vazia / Luz livre)
  - set-control:
      part-id: ldr1
      control: lux
      value: 800
  - delay: 1s

  # 3. Simula a entrada de uma caixa bloqueando a luz (Queda abrupta de lux)
  - set-control:
      part-id: ldr1
      control: lux
      value: 50
  - delay: 300ms

  # 4. Simula a saída da caixa (Luz volta ao normal)
  - set-control:
      part-id: ldr1
      control: lux
      value: 800

  # 5. O sistema deve processar a transição e exibir a contagem atualizada
  # Ajuste a string abaixo de acordo com o padrão do log do seu firmware
  - wait-serial: 'Peca detectada! Total: 1'
  
  - delay: 500ms
