name: 'Cenário 2 - Detecção de Micro-parada na Esteira'
version: 1
author: 'Aluno'
steps:
  # 1. Aguarda a inicialização
  - wait-serial: 'Contador de Producao Inicializado'

  # 2. Simula o bloqueio do sensor por uma caixa que travou na esteira
  - set-control:
      part-id: ldr1
      control: lux
      value: 50

  # 3. Aguarda o tempo limite estipulado no código para considerar uma micro-parada (Ex: 5 segundos)
  - delay: 5s

  # 4. O sistema deve identificar o tempo excessivo sem variação e disparar o alerta na serial
  # Substitua pela string exata definida no seu código
  - wait-serial: 'Alerta: Micro-parada detectada!'
  
  - delay: 500ms
