name: 'Teste de Consumo Parcial - Sem Disparo Prematuro'
version: 1
author: 'Aluno'
steps:
  # 1. Aguarda o sistema inicializar completamente
  - wait-serial: 'Sistema Kanban Inicializado'

  # 2. Simula o estado inicial (caixa completamente cheia)
  - set-control:
      part-id: hx711
      control: load
      value: 5000
  - delay: 1s
  
  # 3. Simula a retirada de algumas peças (peso cai pela metade, ex: 2500g)
  - set-control:
      part-id: hx711
      control: load
      value: 2500

  # 4. Aguarda um tempo para garantir que o sistema processe a leitura e permaneça estável
  - delay: 2s
  
  # 5. Valida que o sistema NÃO enviou alerta e continua em estado normal
  # Nota: Se a mensagem de reposição aparecer aqui, o teste falhará por timeout.
  - wait-serial: 'Status: Estoque Regular (2500g)'
