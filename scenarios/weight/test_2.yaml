name: 'Teste de Ciclo Completo - Consumo e Reabastecimento'
version: 1
author: 'Aluno'
steps:
  # 1. Inicialização do sistema
  - wait-serial: 'Sistema Kanban Inicializado'

  # 2. Caixa fica vazia (atinge o limite mínimo)
  - set-control:
      part-id: hx711
      control: load
      value: 150
  
  # 3. Confirma que o alerta de reposição foi gerado
  - wait-serial: 'Evento de reposição disparado! Caixa vazia detectada.'
  - delay: 1s

  # 4. Simula o reabastecimento completo da caixa pelo operador (peso volta para 5000g)
  - set-control:
      part-id: hx711
      control: load
      value: 5000

  # 5. O sistema deve detectar o aumento de peso e registrar que o estoque foi normalizado
  - wait-serial: 'Abastecimento concluído. Caixa cheia.'
  - delay: 500ms
